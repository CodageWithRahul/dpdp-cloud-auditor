<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password reset</title>
</head>
<body>
  <p>Hello {{ user.get_full_name|default:user.username }},</p>
  <p>You requested a password reset for your DPDP Cloud Auditor account. Click the link below to choose a new password:</p>
  <p><a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}">Reset my password</a></p>
  <p>If you did not request this, you can safely ignore this email.</p>
  <p>Thanks,<br>DPDP Cloud Auditor team</p>
</body>
</html>
