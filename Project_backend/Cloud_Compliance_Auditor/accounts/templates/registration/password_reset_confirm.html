<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Set a new password</title>
</head>
<body>
  <main>
    {% if validlink %}
      <h1>Create a new password</h1>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save password</button>
      </form>
    {% else %}
      <h1>Link invalid</h1>
      <p>This password reset link has expired or is invalid. Request a new link from the login page.</p>
    {% endif %}
    <p><a href="http://127.0.0.1:5500/frontend/pages/login.html">Back to login</a></p>
  </main>
</body>
</html>
