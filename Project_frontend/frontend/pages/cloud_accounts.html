<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cloud Accounts Cloud Auditor</title>
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/accounts.css">
  <link rel="stylesheet" href="../components/loader/loader.css">
</head>
<body>
  <script type="module" src="../components/loader/loader.js"></script>
  <div class="page-shell">
    <div id="shell-nav"></div>
    <main class="main-content">
      <header class="page-header">
        <div>
          <h1>Connected Cloud Accounts</h1>
          <p>View, edit, or delete every cloud account that Cloud Auditor can reach.</p>
        </div>
      </header>

      <section class="panel">
        <div class="section-head">
          <div>
            <h2>Managed cloud accounts</h2>
            <p>Start new scans or remove stale credentials.</p>
          </div>
          <a class="btn primary" href="add_account.html">Add Account</a>
        </div>
        <div class="table-wrapper">
          <table class="list-table">
            <thead>
              <tr>
                <th>Cloud provider</th>
                <th>Name</th>
                <th>Status</th>
                <th>Last scan</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="cloud-accounts-table">
              <tr>
                <td colspan="5" class="empty-row">Retrieving cloud account listings...</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div id="cloud-accounts-message" class="message" aria-live="polite"></div>
      </section>
      <div id="connection-issues-container" class="issues-container"></div>
    </main>
    <div id="shell-footer"></div>
  </div>
  <script type="module">
    import { initShell } from '../js/layout.js';
    initShell('cloud-accounts');
  </script>
  <script type="module" src="../js/accounts.js"></script>
</body>
</html>
