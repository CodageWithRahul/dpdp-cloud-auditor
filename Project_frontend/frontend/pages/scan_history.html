<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scan History Cloud Auditor</title>
    <link rel="stylesheet" href="../css/app.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/scan_history.css">
    <link rel="stylesheet" href="../components/loader/loader.css">
  </head>
  <body>
    <script type="module" src="../components/loader/loader.js"></script>
    <div class="page-shell">
      <div id="shell-nav"></div>
      <main class="main-content">
        <header class="page-header">
          <div>
            <h2>Scan History</h2>
            <p>Review every scan job and jump straight to the findings.</p>
          </div>
        </header>
        <section class="panel">
          <div class="section-head">
            <h3>Recent scans</h3>
            <div class="scan-filter">
              <label class="scan-filter__field">
                Provider
                <input type="search"
                       id="scan-provider-filter"
                       placeholder="Search provider (e.g., AWS)">
              </label>
              <label class="scan-filter__field">
                From
                <input type="date" id="scan-date-from">
              </label>
              <label class="scan-filter__field">
                To
                <input type="date" id="scan-date-to">
              </label>
              <div class="scan-filter__actions">
                <button type="button" class="btn ghost" id="scan-filter-reset">Reset</button>
                <button type="button" class="btn btn-primary" id="scan-filter-apply">Apply</button>
              </div>
            </div>
          </div>
          <div class="table-wrapper">
            <div class="table-scroll">
              <table class="list-table">
                <thead>
                  <tr>
                    <th>Scan ID</th>
                    <th>Cloud Account</th>
                    <th>Cloud Provider</th>
                    <th>Scan Region</th>
                    <th>Status</th>
                    <th>Issues Found</th>
                    <th>Scan Date</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="scan-history-list">
                  <tr>
                    <td colspan="8" class="empty-row">Loading scan history...</td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="history-pagination">
              <button id="prev-page-btn" class="btn secondary">Previous</button>
              <span id="page-info">Page 1</span>
              <button id="next-page-btn" class="btn secondary">Next</button>
            </div>
          </div>
        </section>
      </main>
      <div id="shell-footer"></div>
    </div>
    <script type="module">
        import {
            initShell
        } from '../js/layout.js';
        initShell('scan-history');
    </script>
    <script type="module" src="../js/scan_history.js"></script>
  </body>
</html>
