<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Change password · DPDP Cloud Auditor</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../components/loader/loader.css">
</head>
<body class="page">
  <main class="auth-card">
    <h1>Change password</h1>
    <p>Enter your current password and choose a new one.</p>
    <form id="change-password-form" class="form-grid" novalidate>
      <label for="current-password">Current password</label>
      <div class="input-with-toggle">
        <input class="form-control" type="password" id="current-password" autocomplete="current-password" placeholder="Enter current password" required>
        <button type="button" class="password-toggle" data-toggle-for="current-password" aria-label="Show password">Show</button>
      </div>

      <label for="new-password">New password</label>
      <div class="input-with-toggle">
        <input class="form-control" type="password" id="new-password" autocomplete="new-password" placeholder="Enter new password" required>
        <button type="button" class="password-toggle" data-toggle-for="new-password" aria-label="Show password">Show</button>
      </div>

      <label for="confirm-new-password">Confirm new password</label>
      <div class="input-with-toggle">
        <input class="form-control" type="password" id="confirm-new-password" autocomplete="new-password" placeholder="Confirm new password" required>
        <button type="button" class="password-toggle" data-toggle-for="confirm-new-password" aria-label="Show password">Show</button>
      </div>

      <div id="change-password-message" class="message" aria-live="polite"></div>

      <button class="btn btn-primary btn-full" type="submit">Change password</button>
      <p class="auth-link auth-link--bottom">
        <a class="auth-link__action" href="user_details.html">Back to profile</a>
      </p>
    </form>
  </main>
  <script type="module" src="../components/loader/loader.js"></script>
  <script type="module" src="../js/password-toggle.js"></script>
  <script type="module" src="../js/change_password.js"></script>
</body>
</html>
