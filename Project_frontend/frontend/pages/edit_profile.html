<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit profile · DPDP Cloud Auditor</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../components/loader/loader.css">
</head>
<body class="page">
  <main class="auth-card">
    <h1>Update profile</h1>
    <p>Review and edit the full name and email associated with your account.</p>
    <form id="edit-profile-form" class="form-grid" novalidate>
      <label for="full-name">Full name</label>
      <input class="form-control" type="text" id="full-name" placeholder="Enter full name">

      <label for="email">Email address</label>
      <input class="form-control" type="email" id="email" placeholder="Enter email" required>

      <div id="edit-profile-message" class="message" aria-live="polite"></div>

      <div class="form-actions">
        <button type="button" class="btn ghost" id="edit-profile-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary btn-full">Save changes</button>
      </div>
      <p class="auth-link auth-link--bottom">
        <a class="auth-link__action" href="user_details.html">Back to profile</a>
      </p>
    </form>
  </main>
  <script type="module" src="../components/loader/loader.js"></script>
  <script type="module" src="../js/edit_profile.js"></script>
</body>
</html>
