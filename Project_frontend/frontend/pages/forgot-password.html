<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot password - DPDP Cloud Auditor</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../components/loader/loader.css">
</head>
<body class="page">
  <main class="auth-card">
    <h1>Reset password</h1>
    <p>Tell us the email for your account and we will send a reset link.</p>
    <form id="forgot-password-form" class="form-grid" novalidate>
      <label for="reset-email">Email</label>
      <input class="form-control" type="email" id="reset-email" autocomplete="email" required>

      <div id="forgot-password-message" class="message" aria-live="polite"></div>

      <div class="form-actions">
        <button class="btn btn-primary" type="submit">Send reset link</button>
        <a class="btn btn-secondary" role="button" href="login.html">Back to login</a>
      </div>
    </form>
  </main>
  <script type="module" src="../components/loader/loader.js"></script>
  <script type="module" src="../js/forgot-password.js"></script>
</body>
</html>
